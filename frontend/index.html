<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Cinema | Vector Engine</title>
    <style>
        /* CSS Variables */
        :root {
            --primary: #fff;
            --bg: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
            --brand-green: #10b981;
            --brand-red: #ef4444;
            --brand-blue: #3b82f6;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* The liquid movement layer */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            width: 200vw; height: 200vh;
            background: 
                radial-gradient(circle at 30% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 75% 40%, rgba(16, 185, 129, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 15% 65%, rgba(255, 255, 255, 0.05) 0%, transparent 35%),
                radial-gradient(circle at 60% 85%, rgba(239, 68, 68, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 10%, rgba(255, 255, 255, 0.1) 0%, transparent 30%);
            animation: waveFlow 25s infinite alternate ease-in-out;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes waveFlow {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(-5%, 8%) rotate(10deg) scale(1.1); }
            100% { transform: translate(4%, -5%) rotate(-5deg) scale(0.95); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header Branding */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .title-block h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            color: var(--primary);
            text-transform: lowercase;
            line-height: 1;
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Status Pill */
        .status-pill {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--brand-red);
        }
        .status-dot.online { background: var(--brand-green); }
        .status-dot.pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Forms & Labels */
        label {
            display: block;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .val-display {
            color: var(--primary);
            font-size: 1rem;
            float: right;
        }

        /* Glass Input Fields */
        textarea, input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-family: inherit;
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.05), 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        textarea {
            font-size: 1.3rem;
            padding: 20px;
            min-height: 120px;
            resize: vertical;
        }

        input[type="number"] {
            font-size: 1.2rem;
            padding: 15px 20px;
        }

        textarea:focus, input[type="number"]:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Sliders & Controls Layout */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .slider-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
            margin-top: 10px;
        }

        /* The Action Trigger Button */
        button {
            width: 100%;
            background-color: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            padding: 24px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s ease;
        }

        button:active { transform: scale(0.98); }
        button:disabled {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* Split Screen Output Area */
        #output-section {
            display: none;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 40px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .engine-column {
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            flex-col;
            overflow: hidden;
            flex-direction: column;
        }

        .column-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .engine-title {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .hnsw-title { color: var(--brand-green); }
        .bf-title { color: var(--brand-red); }

        .latency-display {
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .results-container {
            padding: 20px;
            overflow-y: auto;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Movie Card Glass */
        .movie-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s ease;
        }
        
        .movie-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .movie-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .movie-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
            margin: 0;
        }

        .movie-year {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .movie-distance {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--brand-blue);
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .movie-meta {
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.8rem;
            color: var(--brand-green);
            margin-bottom: 12px;
        }

        .movie-plot {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }

        .loading-state {
            padding: 40px;
            text-align: center;
            font-family: ui-monospace, SFMono-Regular, monospace;
            color: var(--text-muted);
            animation: pulse 1.5s infinite;
        }

        @media (max-width: 900px) {
            .results-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .controls-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="title-block">
                <h1>semantic cinema</h1>
                <div class="subtitle">Multi-Layer Skip Graph vs Linear Scan • Vector Engine</div>
            </div>
            
            <div class="status-pill">
                <div id="status-dot" class="status-dot pulse"></div>
                <span id="status-text">Booting API...</span>
                <span style="color:rgba(255,255,255,0.2)">|</span>
                <span id="record-count" style="color: var(--brand-blue)">0 records</span>
            </div>
        </header>

        <main>
            <form id="search-form">
                <label for="query">Semantic Vibe / Plot Description</label>
                <textarea id="query" placeholder="Drop a vibe... (e.g. 'A gritty 90s mob movie directed by Scorsese')"></textarea>

                <div class="controls-grid">
                    <div class="slider-box">
                        <label for="min-year">Absolute Minimum Year</label>
                        <input type="number" id="min-year" placeholder="e.g. 1990 (Optional)">
                    </div>
                    <div class="slider-box">
                        <label for="topk">Top-K Results <span id="topk-val" class="val-display">10</span></label>
                        <input type="range" id="topk" min="1" max="50" step="1" value="10">
                    </div>
                </div>

                <button type="submit" id="generate-btn" disabled>EXECUTE SEARCH</button>
            </form>

            <div id="output-section">
                <div class="results-grid">
                    <div class="engine-column">
                        <div class="column-header">
                            <span class="engine-title hnsw-title">Custom HNSW Graph</span>
                            <span id="hnsw-time" class="latency-display hnsw-title">-- ms</span>
                        </div>
                        <div id="hnsw-results" class="results-container"></div>
                    </div>

                    <div class="engine-column">
                        <div class="column-header">
                            <span class="engine-title bf-title">Numpy Brute Force O(N)</span>
                            <span id="bf-time" class="latency-display bf-title">-- ms</span>
                        </div>
                        <div id="bf-results" class="results-container"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000';
        
        // DOM Elements
        const elements = {
            form: document.getElementById('search-form'),
            query: document.getElementById('query'),
            year: document.getElementById('min-year'),
            kSlider: document.getElementById('topk'),
            kValDisplay: document.getElementById('topk-val'),
            btn: document.getElementById('generate-btn'),
            
            statusDot: document.getElementById('status-dot'),
            statusText: document.getElementById('status-text'),
            recordCount: document.getElementById('record-count'),
            
            outputSection: document.getElementById('output-section'),
            hnswResults: document.getElementById('hnsw-results'),
            hnswTime: document.getElementById('hnsw-time'),
            bfResults: document.getElementById('bf-results'),
            bfTime: document.getElementById('bf-time')
        };

        // UI Interactions
        elements.kSlider.addEventListener('input', (e) => {
            elements.kValDisplay.textContent = e.target.value;
        });

        const setStatus = (isOnline, text, records = 0) => {
            elements.statusDot.className = `status-dot ${isOnline ? 'online' : 'pulse'}`;
            elements.statusText.textContent = text;
            elements.recordCount.textContent = `${records.toLocaleString()} records`;
            elements.btn.disabled = !isOnline;
        };

        const createMovieCard = (movie, rank) => `
            <div class="movie-card">
                <div class="movie-header">
                    <h3 class="movie-title">
                        <span style="color:var(--text-muted); font-size:0.9rem; font-family:monospace">#${rank}</span> 
                        ${movie.title} <span class="movie-year">(${movie.year})</span>
                    </h3>
                    <span class="movie-distance">Dist: ${movie.distance.toFixed(4)}</span>
                </div>
                <div class="movie-meta">
                    ${movie.director ? movie.director + ' • ' : ''}${movie.genres}
                </div>
                <p class="movie-plot">${movie.overview}</p>
            </div>
        `;

        // System Polling
        const checkHealth = async () => {
            try {
                const res = await fetch(`${API_URL}/health`);
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();
                
                if (data.status === 'online' && data.graph_loaded && data.baseline_loaded) {
                    setStatus(true, 'SYSTEM ONLINE', data.records);
                } else {
                    setStatus(false, 'STITCHING GRAPH...', data.records);
                    setTimeout(checkHealth, 2000);
                }
            } catch (err) {
                setStatus(false, 'SERVER OFFLINE');
                setTimeout(checkHealth, 3000);
            }
        };

        // Execution Logic
        const executeQuery = async (endpoint, payload, resultsContainer, timeContainer) => {
            resultsContainer.innerHTML = `<div class="loading-state">Querying matrix subspace...</div>`;
            timeContainer.textContent = "calculating...";
            
            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!res.ok) throw new Error('API Fault');
                const data = await res.json();
                
                resultsContainer.innerHTML = data.results.map((m, i) => createMovieCard(m, i+1)).join('');
                timeContainer.textContent = `${data.latency_ms.toFixed(2)} ms`;
                
            } catch (error) {
                resultsContainer.innerHTML = `<div class="loading-state" style="color:var(--brand-red)">ERR: Connection reset.</div>`;
                timeContainer.textContent = "FAIL";
            }
        };

        // Form Submission
        elements.form.addEventListener('submit', (e) => {
            e.preventDefault();
            const queryText = elements.query.value.trim();
            if (!queryText) return;

            const payload = {
                query: queryText,
                k: parseInt(elements.kSlider.value)
            };
            
            if (elements.year.value) {
                payload.filters = { min_year: parseInt(elements.year.value) };
            }

            elements.btn.disabled = true;
            elements.btn.textContent = "SEARCHING...";
            elements.outputSection.style.display = "block";

            // Execute parallel requests to both engines
            Promise.all([
                executeQuery('/search/graph', payload, elements.hnswResults, elements.hnswTime),
                executeQuery('/search/brute', payload, elements.bfResults, elements.bfTime)
            ]).finally(() => {
                elements.btn.disabled = false;
                elements.btn.textContent = "EXECUTE SEARCH";
            });
        });

        // Initialize
        checkHealth();
    </script>
</body>
</html>
